{% load static %}
{% load authentik_core %}

{% if ui_theme == "dark" %}
  <meta name="color-scheme" content="dark" />
  <meta name="theme-color" content="#18191a">

  {% elif ui_theme == "light" %}
  <meta name="color-scheme" content="light" />
  <meta name="theme-color" content="#ffffff">
  {% else %}
  <script data-id="theme-script">
    "use strict";

    (function () {
        try {
            /* Ignore older theme names */
            let locallyStoredTheme = window.localStorage?.getItem("theme") || null;
            if (typeof locallyStoredTheme === "string") {
                locallyStoredTheme = locallyStoredTheme.trim();
            }
            if (!(["auto", "light", "dark"].includes(locallyStoredTheme))) {
                locallyStoredTheme = null;
            }
            
            const initialThemeChoice =
                new URLSearchParams(window.location.search).get("theme") || locallyStoredTheme;

            const themeChoice =
                initialThemeChoice || document.documentElement.dataset.themeChoice || "auto";

            document.documentElement.dataset.themeChoice = themeChoice;

            if (themeChoice === "auto") {
                // ATLAS / ARIA is an always-dark surface: "auto" resolves to dark,
                // ignoring the OS preference.
                document.documentElement.dataset.theme = "dark";
            } else {
                document.documentElement.dataset.theme = themeChoice;
            }

            // ARIA guard: the web app re-resolves the theme after load and can
            // flip "auto" back to light. Keep it dark whenever the choice is auto.
            new MutationObserver(function () {
                var de = document.documentElement;
                var c = de.dataset.themeChoice;
                if ((!c || c === "auto") && de.dataset.theme !== "dark") {
                    de.dataset.theme = "dark";
                }
            }).observe(document.documentElement, {
                attributes: true,
                attributeFilter: ["data-theme", "data-theme-choice"],
            });
        } catch (e) {
            console.error("Failed to apply theme", e);
        }
    })();

    /* ATLAS deep theme: some authentik components (e.g. the applications
       split-button) render in shadow roots that do NOT adopt the brand custom
       CSS, so their dark-mode primary hover stays light → white-on-white text.
       Inject a corrective stylesheet into every open shadow root (and any
       created later) to force readable primary hovers app-wide. */
    (function () {
        "use strict";
        var CSS =
            ".pf-c-button.pf-m-primary:hover,.pf-c-button.pf-m-primary:focus," +
            ".pf-c-dropdown__toggle.pf-m-primary:hover,.pf-c-dropdown__toggle.pf-m-primary>button:hover," +
            ".pf-c-dropdown__toggle.pf-m-primary .pf-c-dropdown__toggle-button:hover," +
            ".pf-c-menu-toggle.pf-m-primary:hover{" +
            "background-color:#1f49b8 !important;background-image:none !important;color:#ffffff !important}" +
            ".pf-c-dropdown__toggle.pf-m-primary:hover *,.pf-c-button.pf-m-primary:hover *{color:#ffffff !important}";
        var sheet = null;
        try {
            sheet = new CSSStyleSheet();
            sheet.replaceSync(CSS);
        } catch (e) {
            return; /* constructable stylesheets unsupported */
        }
        function inject(root) {
            if (!root || !("adoptedStyleSheets" in root)) return;
            try {
                if (root.adoptedStyleSheets.indexOf(sheet) === -1) {
                    root.adoptedStyleSheets = root.adoptedStyleSheets.concat
                        ? root.adoptedStyleSheets.concat(sheet)
                        : [].slice.call(root.adoptedStyleSheets).concat(sheet);
                }
            } catch (e) {}
        }
        function walk(root) {
            inject(root);
            var els = root.querySelectorAll ? root.querySelectorAll("*") : [];
            for (var i = 0; i < els.length; i++) {
                if (els[i].shadowRoot) walk(els[i].shadowRoot);
            }
        }
        function sweep() {
            try {
                walk(document);
            } catch (e) {}
        }
        if (document.readyState === "loading") {
            document.addEventListener("DOMContentLoaded", sweep);
        } else {
            sweep();
        }
        new MutationObserver(sweep).observe(document.documentElement, {
            childList: true,
            subtree: true,
        });
        setInterval(sweep, 1500);
    })();
  </script>

  <meta name="color-scheme" content="light dark" />
  <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#18191a" media="(prefers-color-scheme: dark)">
{% endif %}
