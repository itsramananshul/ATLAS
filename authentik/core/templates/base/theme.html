{% load static %}
{% load authentik_core %}

{% if ui_theme == "dark" %}
  <meta name="color-scheme" content="dark" />
  <meta name="theme-color" content="#18191a">

  {% elif ui_theme == "light" %}
  <meta name="color-scheme" content="light" />
  <meta name="theme-color" content="#ffffff">
  {% else %}
  <script data-id="theme-script">
    "use strict";

    (function () {
        try {
            /* Ignore older theme names */
            let locallyStoredTheme = window.localStorage?.getItem("theme") || null;
            if (typeof locallyStoredTheme === "string") {
                locallyStoredTheme = locallyStoredTheme.trim();
            }
            if (!(["auto", "light", "dark"].includes(locallyStoredTheme))) {
                locallyStoredTheme = null;
            }
            
            const initialThemeChoice =
                new URLSearchParams(window.location.search).get("theme") || locallyStoredTheme;

            const themeChoice =
                initialThemeChoice || document.documentElement.dataset.themeChoice || "auto";

            document.documentElement.dataset.themeChoice = themeChoice;

            if (themeChoice === "auto") {
                // ATLAS / ARIA is an always-dark surface: "auto" resolves to dark,
                // ignoring the OS preference.
                document.documentElement.dataset.theme = "dark";
            } else {
                document.documentElement.dataset.theme = themeChoice;
            }

            // ARIA guard: the web app re-resolves the theme after load and can
            // flip "auto" back to light. Keep it dark whenever the choice is auto.
            new MutationObserver(function () {
                var de = document.documentElement;
                var c = de.dataset.themeChoice;
                if ((!c || c === "auto") && de.dataset.theme !== "dark") {
                    de.dataset.theme = "dark";
                }
            }).observe(document.documentElement, {
                attributes: true,
                attributeFilter: ["data-theme", "data-theme-choice"],
            });
        } catch (e) {
            console.error("Failed to apply theme", e);
        }
    })();
  </script>

  <meta name="color-scheme" content="light dark" />
  <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#18191a" media="(prefers-color-scheme: dark)">
{% endif %}
