# ATLAS local runtime — runs our self-built server image (server + worker)
# with PostgreSQL + Redis. Secrets come from .env.atlas (never committed).
#   docker compose --env-file .env.atlas -f docker-compose.atlas.yml up -d
services:
  postgresql:
    image: docker.io/library/postgres:16-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d $${POSTGRES_DB} -U $${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - database:/var/lib/postgresql/data
    environment:
      POSTGRES_PASSWORD: ${PG_PASS}
      POSTGRES_USER: ${PG_USER:-authentik}
      POSTGRES_DB: ${PG_DB:-authentik}

  redis:
    image: docker.io/library/redis:alpine
    command: --save 60 1 --loglevel warning
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep PONG"]
      interval: 10s
      timeout: 3s
      retries: 10
    volumes:
      - redis:/data

  server:
    image: atlas/server:2026.8.0-rc1
    restart: unless-stopped
    command: server
    environment:
      AUTHENTIK_SECRET_KEY: ${AUTHENTIK_SECRET_KEY}
      AUTHENTIK_ERROR_REPORTING__ENABLED: "false"
      AUTHENTIK_POSTGRESQL__HOST: postgresql
      AUTHENTIK_POSTGRESQL__USER: ${PG_USER:-authentik}
      AUTHENTIK_POSTGRESQL__NAME: ${PG_DB:-authentik}
      AUTHENTIK_POSTGRESQL__PASSWORD: ${PG_PASS}
      AUTHENTIK_REDIS__HOST: redis
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9443:9443"
    depends_on:
      postgresql:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    image: atlas/server:2026.8.0-rc1
    restart: unless-stopped
    command: worker
    environment:
      AUTHENTIK_SECRET_KEY: ${AUTHENTIK_SECRET_KEY}
      AUTHENTIK_ERROR_REPORTING__ENABLED: "false"
      AUTHENTIK_POSTGRESQL__HOST: postgresql
      AUTHENTIK_POSTGRESQL__USER: ${PG_USER:-authentik}
      AUTHENTIK_POSTGRESQL__NAME: ${PG_DB:-authentik}
      AUTHENTIK_POSTGRESQL__PASSWORD: ${PG_PASS}
      AUTHENTIK_REDIS__HOST: redis
    depends_on:
      postgresql:
        condition: service_healthy
      redis:
        condition: service_healthy

  # MCP server — lets Claude manage ATLAS (users, apps, OAuth providers,
  # audit log) over MCP. Streamable-HTTP transport at :9100.
  # Set MCP_AUTHENTIK_TOKEN (+ MCP_AUTHENTIK_URL to the public URL on the
  # VPS) in .env.atlas. Put it behind the reverse proxy / TLS in prod.
  mcp:
    build: ./mcp-server
    restart: unless-stopped
    environment:
      AUTHENTIK_URL: ${MCP_AUTHENTIK_URL:-http://server:9000}
      AUTHENTIK_TOKEN: ${MCP_AUTHENTIK_TOKEN}
      MCP_TRANSPORT: http
      MCP_HOST: 0.0.0.0
      MCP_PORT: "9100"
    ports:
      - "127.0.0.1:9100:9100"
    depends_on:
      - server

volumes:
  database:
  redis:
