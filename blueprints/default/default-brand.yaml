metadata:
  name: Default - Brand
version: 1
entries:
  - model: authentik_blueprints.metaapplyblueprint
    attrs:
      identifiers:
        name: Default - Authentication flow
      required: false
  - model: authentik_blueprints.metaapplyblueprint
    attrs:
      identifiers:
        name: Default - Invalidation flow
      required: false
  - model: authentik_blueprints.metaapplyblueprint
    attrs:
      identifiers:
        name: Default - User settings flow
      required: false
  - attrs:
      branding_title: ARIA
      branding_custom_css: |
          /* ATLAS / ARIA brand custom CSS — injected into every component shadow root.
             Rounds every "box" like the login card, kills horizontal scrollbars, and
             lets the black background show through the page chrome.
             NOTE: do NOT set overflow/height/border on the card HOST elements
             (ak-aggregate-card / ak-*-chart-*) — that breaks ApexCharts auto-sizing
             and the cards balloon to thousands of px tall. Style .pf-c-card only. */

          /* ---- Cards / boxes: round ---- */
          .pf-c-card,
          .pf-c-content-card {
              border-radius: 20px !important;
              border: 1px solid rgba(255, 255, 255, 0.1) !important;
          }

          /* ---- Page chrome transparent so the black body shows ---- */
          .pf-c-page,
          .pf-c-page__main,
          .pf-c-page__main-section,
          .pf-c-page__sidebar,
          .pf-c-page__sidebar-body,
          .pf-c-page__header,
          .pf-c-drawer,
          .pf-c-drawer__content,
          .pf-c-drawer__panel-main {
              background: transparent !important;
          }
          .pf-c-page__sidebar {
              border-inline-end: 1px solid rgba(255, 255, 255, 0.1) !important;
          }
          .pf-c-page__header {
              border-block-end: 1px solid rgba(255, 255, 255, 0.1) !important;
          }

          /* ---- Kill horizontal scrollbars (the left menu and lists) ---- */
          .pf-c-nav,
          .pf-c-nav__list,
          .pf-c-nav__subnav,
          .pf-c-page__main-section {
              overflow-x: hidden !important;
          }
          .pf-c-nav__link {
              border-radius: 12px !important;
              margin-inline: 0 !important;
          }

          /* ---- Tabs ---- */
          .pf-c-tabs__link {
              border-radius: 999px !important;
          }

          /* ---- Buttons / chips / toggles → rounded (incl. the "User interface" button) ---- */
          .pf-c-button,
          a.pf-c-button,
          button.pf-c-button,
          .pf-c-chip,
          .pf-c-menu-toggle,
          .pf-c-toggle-group__button {
              border-radius: 12px !important;
          }

          /* ---- Toolbars: transparent containers, rounded search & bars ---- */
          .pf-c-toolbar,
          .pf-c-toolbar__content,
          .pf-c-toolbar__content-section,
          .pf-c-toolbar__item,
          .pf-c-toolbar__group {
              background: transparent !important;
          }
          .pf-c-input-group,
          .pf-c-text-input-group,
          .pf-c-text-input-group__main,
          .pf-c-text-input-group__text {
              border-radius: 999px !important;
          }
          .pf-c-form-control {
              border-radius: 999px !important;
          }

          /* "Last refreshed / pagination" style bars → rounded */
          .pf-c-pagination,
          .pf-c-pagination__nav,
          .pf-c-toolbar__item.pf-m-pagination {
              border-radius: 14px !important;
          }

          /* ---- Tables sit transparent on the black surface ---- */
          .pf-c-table,
          .pf-c-table > tbody,
          .pf-c-table > thead,
          .pf-c-table tr {
              background: transparent !important;
          }

          /* ---- Modals, dropdowns, menus → rounded ---- */
          .pf-c-modal-box,
          .pf-c-dropdown__menu,
          .pf-c-menu,
          .pf-c-select__menu,
          .pf-c-tooltip__content {
              border-radius: 16px !important;
          }
      flow_authentication:
        !Find [authentik_flows.flow, [slug, default-authentication-flow]]
      flow_invalidation:
        !Find [authentik_flows.flow, [slug, default-invalidation-flow]]
      flow_user_settings:
        !Find [authentik_flows.flow, [slug, default-user-settings-flow]]
    identifiers:
      domain: authentik-default
      default: true
    state: created
    conditions:
      - !Condition [NOR, !Find [authentik_brands.brand, [default, True]]]
    model: authentik_brands.brand
